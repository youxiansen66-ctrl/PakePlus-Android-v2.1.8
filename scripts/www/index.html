<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>网页打印示例</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #1a1008;
        --paper: #f5f0e8;
        --accent: #c0392b;
        --gold: #b8860b;
        --border: #d4c5a9;
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        background: #2c2416;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 40px 20px;
        font-family: "Noto Serif SC", serif;
      }

      .controls {
        display: flex;
        gap: 16px;
        margin-bottom: 36px;
      }

      .btn {
        padding: 12px 28px;
        border: none;
        cursor: pointer;
        font-family: "Noto Serif SC", serif;
        font-size: 15px;
        letter-spacing: 2px;
        transition: all 0.25s;
        clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
      }

      .btn-print {
        background: var(--accent);
        color: #fff;
        box-shadow: 0 4px 20px rgba(192, 57, 43, 0.45);
      }

      .btn-print:hover {
        background: #a93226;
        transform: translateY(-2px);
      }

      .paper-wrap {
        position: relative;
      }

      .paper-wrap::before,
      .paper-wrap::after {
        content: "";
        position: absolute;
        background: #ece7db;
      }
      .paper-wrap::before {
        inset: 6px -4px -4px 4px;
        z-index: -1;
        opacity: 0.5;
      }
      .paper-wrap::after {
        inset: 12px -8px -8px 8px;
        z-index: -2;
        opacity: 0.25;
      }

      .paper {
        width: 560px;
        background: var(--paper);
        padding: 56px 72px;
        position: relative;
        box-shadow:
          0 20px 60px rgba(0, 0, 0, 0.5),
          0 4px 8px rgba(0, 0, 0, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 180px;
      }

      .paper::before {
        content: "";
        position: absolute;
        left: 90px;
        top: 0;
        bottom: 0;
        width: 1px;
        background: rgba(192, 57, 43, 0.25);
      }

      .message {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: var(--ink);
        letter-spacing: 2px;
        text-align: center;
        line-height: 1.5;
      }

      .message span {
        color: var(--accent);
        font-style: italic;
      }

      @media print {
        body {
          background: none;
          padding: 0;
          justify-content: flex-start;
          padding-top: 60mm;
        }
        .controls {
          display: none;
        }
        .paper-wrap::before,
        .paper-wrap::after {
          display: none;
        }
        .paper {
          width: 100%;
          box-shadow: none;
          padding: 40px 60px;
        }
        @page {
          size: A4;
          margin: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="controls">
      <button class="btn btn-print" onclick="window.print()">⎙ 打印文档</button>
    </div>

    <div class="paper-wrap">
      <div class="paper">
        <div class="message">你好，<span>世界</span>。愿岁月待你温柔。</div>
      </div>
    </div>
  </body>
</html>
